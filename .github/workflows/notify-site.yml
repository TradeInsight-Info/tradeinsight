name: Notify site of content update

on:
  push:
    branches: [master]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger tradeinsight-web deploy
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.MONO_REPO_DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/TradeInsight-Info/tradeinsight/dispatches \
            -d '{"event_type":"content-updated"}'
